<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
  <div class="stack">
    <div class="swatch" style="background:var(--background);">
      <div><b style="color:var(--foreground)">--foreground</b><small>oklch(0.98 0 0) — primary text</small></div>
    </div>
    <div class="swatch" style="background:var(--background);">
      <div><b style="color:var(--muted-foreground)">--muted-foreground</b><small>oklch(0.7 0.005 250) — labels &amp; meta</small></div>
    </div>
    <div class="swatch" style="background:var(--background);">
      <div><b style="color:oklch(1 0 0 / 50%)">disabled-foreground</b><small>50% white — disabled / placeholder</small></div>
    </div>
  </div>
</body></html>

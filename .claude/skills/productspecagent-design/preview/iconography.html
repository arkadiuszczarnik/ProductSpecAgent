<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display:grid; grid-template-columns: repeat(8, 1fr); gap: 14px 8px; }
  .ic { display:flex; flex-direction:column; align-items:center; gap:6px; color:var(--foreground); }
  .ic svg { width:20px; height:20px; stroke-width:1.5; }
  .ic small { color: var(--muted-foreground); font-size:10px; }
</style></head>
<body class="card">
  <div class="grid" id="g"></div>
  <script>
    const names = ['sparkles','folder-kanban','plus','cpu','settings','bot','user','send','arrow-left','arrow-right','check','x','star','alert-triangle','lock','info','calendar','layers','book-open','help-circle','file-text','folder-tree','activity','download'];
    const g = document.getElementById('g');
    Promise.all(names.map(n => fetch('../assets/icons/'+n+'.svg').then(r=>r.text()).then(svg=>({n,svg}))))
      .then(items => {
        g.innerHTML = items.map(({n,svg}) => `<div class="ic">${svg}<small>${n}</small></div>`).join('');
      });
  </script>
</body></html>

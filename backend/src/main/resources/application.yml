server:
  port: 8080

spring:
  application:
    name: product-spec-agent
  jackson:
    default-property-inclusion: always
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

cors:
  allowed-origins: "http://localhost:3000"

ai:
  koog:
    openai:
      api-key: ${OPENAI_API_KEY:not-set}

agent:
  models:
    tiers:
      SMALL: "gpt-5-nano"
      MEDIUM: "gpt-5-mini"
      LARGE: "gpt-5-2"
    defaults:
      idea-to-spec: LARGE
      decision: MEDIUM
      feature-proposal: MEDIUM
      plan-generator: LARGE
app:
  storage:
    bucket: ${S3_BUCKET:productspec-data}
    endpoint: ${S3_ENDPOINT:}
    region: ${S3_REGION:us-east-1}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    path-style-access: ${S3_PATH_STYLE:false}

graphmesh:
  enabled: ${GRAPHMESH_ENABLED:false}
  url: ${GRAPHMESH_URL:http://localhost:8083/graphql}
  request-timeout: 30s

feature-proposal:
  uploads:
    max-bytes-per-file: ${FEATURE_PROPOSAL_UPLOAD_MAX_BYTES_PER_FILE:102400}
    max-bytes-total: ${FEATURE_PROPOSAL_UPLOAD_MAX_BYTES_TOTAL:512000}

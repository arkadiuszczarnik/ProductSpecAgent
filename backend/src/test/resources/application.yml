server:
  port: 8080

spring:
  application:
    name: product-spec-agent
  jackson:
    default-property-inclusion: always
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

cors:
  allowed-origins: "http://localhost:3000"

ai:
  koog:
    openai:
      api-key: ${OPENAI_API_KEY:not-set}

agent:
  models:
    tiers:
      SMALL: "gpt-4o-mini"
      MEDIUM: "gpt-4o-mini"
      LARGE: "gpt-4o-mini"
    defaults:
      idea-to-spec: LARGE
      decision: MEDIUM
      feature-proposal: MEDIUM
      plan-generator: LARGE
      design-summary: MEDIUM

app:
  storage:
    bucket: test-bucket
    endpoint: ""
    region: us-east-1
    access-key: ""
    secret-key: ""
    path-style-access: false

graphmesh:
  enabled: true
  url: http://localhost:0/graphql
  request-timeout: 5s

<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.steps { display:flex; align-items:center; gap:0; }
.step { display:flex; align-items:center; gap:8px; padding:0 12px; }
.dot { width:24px; height:24px; border-radius:9999px; display:grid; place-items:center; font-size:11px; font-weight:600; }
.label { font-size:12px; font-weight:500; color:var(--muted-foreground); }
.connector { flex:1; height:2px; background:var(--c-surface-2); min-width:24px; }
.connector.done { background: var(--primary); }
.done .dot { background: var(--primary); color: var(--primary-foreground); }
.active .dot { background: var(--primary); color: var(--primary-foreground); box-shadow: 0 0 0 3px oklch(0.62 0.19 260 / 30%); }
.active .label { color: var(--foreground); font-weight:600; }
.todo .dot { background: var(--c-surface-2); color: var(--muted-foreground); }
</style></head>
<body class="card">
  <div class="steps">
    <div class="step done"><span class="dot"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span><span class="label">Idee</span></div>
    <div class="connector done"></div>
    <div class="step done"><span class="dot"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span><span class="label">Problem</span></div>
    <div class="connector done"></div>
    <div class="step active"><span class="dot">3</span><span class="label">Features</span></div>
    <div class="connector"></div>
    <div class="step todo"><span class="dot">4</span><span class="label">MVP</span></div>
    <div class="connector"></div>
    <div class="step todo"><span class="dot">5</span><span class="label">Frontend</span></div>
  </div>
</body></html>

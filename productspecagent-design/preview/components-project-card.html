<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.proj {
  background: var(--card); border:1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px; flex:1; min-width:0;
  transition: transform 200ms, box-shadow 200ms;
  display:flex; flex-direction:column; gap:10px;
  cursor:pointer;
}
.proj:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.proj h3 { margin:0; font-size:16px; font-weight:600; letter-spacing:-0.01em; }
.proj .row2 { display:flex; gap:6px; flex-wrap:wrap; }
.proj .row2 .b { display:inline-flex; align-items:center; height:20px; padding:0 8px; border-radius:9999px; font-size:10px; font-weight:600; letter-spacing:0.02em; }
.bar { height:4px; background:var(--c-surface-2); border-radius:9999px; overflow:hidden; }
.bar > i { display:block; height:100%; background:var(--primary); }
</style></head>
<body class="card">
  <div class="row">
    <div class="proj">
      <h3>Bromo Control Hub</h3>
      <small>07. Mai 2026 · web-app</small>
      <div class="bar"><i style="width:100%"></i></div>
      <div class="row2">
        <span class="b" style="background:var(--c-success-10);color:var(--c-success)">8 / 8</span>
        <span class="b" style="background:var(--c-surface-2);color:var(--muted-foreground)">FRONTEND</span>
      </div>
    </div>
    <div class="proj">
      <h3>Newsroom Sync</h3>
      <small>05. Mai 2026 · web-app</small>
      <div class="bar"><i style="width:50%"></i></div>
      <div class="row2">
        <span class="b" style="background:var(--c-primary-10);color:var(--c-primary)">4 / 8</span>
        <span class="b" style="background:var(--c-surface-2);color:var(--muted-foreground)">DESIGN</span>
      </div>
    </div>
  </div>
</body></html>

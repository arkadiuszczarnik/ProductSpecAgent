<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .b { display:inline-flex; align-items:center; gap:5px; height:22px; padding:0 8px; border-radius:9999px; font-size:11px; font-weight:500; line-height:1; border:1px solid transparent; }
  .b svg { width:11px; height:11px; stroke-width:1.5; }
</style></head>
<body class="card">
  <div class="row" style="gap:8px;flex-wrap:wrap;align-items:center">
    <span class="b" style="background:var(--c-primary-10);color:var(--c-primary);border-color:var(--c-primary-20)">In Progress</span>
    <span class="b" style="background:var(--c-success-10);color:var(--c-success);border-color:oklch(0.65 0.15 160 / 30%)">Resolved</span>
    <span class="b" style="background:var(--c-warning-10);color:var(--c-warning);border-color:oklch(0.7 0.18 80 / 30%)">Open</span>
    <span class="b" style="background:var(--c-surface-2);color:var(--muted-foreground);border-color:var(--border)">Pending</span>
    <span class="b" style="background:oklch(0.7 0.18 290 / 10%);color:oklch(0.7 0.18 290);border-color:oklch(0.7 0.18 290 / 30%)">AI Recommendation</span>
    <span class="b" style="background:transparent;color:var(--muted-foreground);border-color:var(--border)">FRONTEND</span>
    <span class="b" style="background:var(--c-success-10);color:var(--c-success);border-color:transparent">8 / 8</span>
  </div>
  <small style="margin-top:14px;display:block">Tinted bg + matching text + tinted 1px border. Never solid fill.</small>
</body></html>

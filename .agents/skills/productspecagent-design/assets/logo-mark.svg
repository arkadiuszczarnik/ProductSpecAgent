<svg width="189" height="163" viewBox="0 0 189 163" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Product Spec Agent Icon</title>
  <desc id="desc">A clean vector recreation of the Product Spec Agent icon: blue outlined document with folded corner, purple AI sparkle, small diamond particles, and three rounded specification lines.</desc>
  <defs>
    <linearGradient id="docStroke" x1="56" y1="3" x2="159" y2="145" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6C7CFF"></stop>
      <stop offset="0.42" stop-color="#5177FF"></stop>
      <stop offset="0.74" stop-color="#128FE7"></stop>
      <stop offset="1" stop-color="#10B9F0"></stop>
    </linearGradient>
    <linearGradient id="sparkFill" x1="25" y1="63" x2="89" y2="132" gradientUnits="userSpaceOnUse">

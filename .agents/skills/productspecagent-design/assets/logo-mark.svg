      <stop offset="1" stop-color="#5E74FF"></stop>
    </linearGradient>
    <linearGradient id="lineStroke" x1="105" y1="72" x2="162" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8A67FF"></stop>

<!doctype html>
<html lang="de" class="dark">
<head>
<meta charset="utf-8"/>
<title>Spec Agent — UI Kit</title>
<meta name="viewport" content="width=1440"/>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  /* ============================ shell ============================ */
  html, body { height: 100%; margin: 0; }
  body { background: var(--background); color: var(--foreground); font-family: var(--font-sans); position: relative; }
  #root { height: 100vh; position: relative; z-index: 1; }

  /* ============================ bg animation ============================ */
  .bg-art {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 360px; height: 310px;
    z-index: 0;
    pointer-events: none;
    opacity: 0.45;
  }
  .bg-art::before {
    content: ""; position: absolute; inset: -60px;
    border-radius: 50%;
    background: oklch(0.62 0.19 260 / 22%);
    filter: blur(50px);
    animation: bg-halo 4s ease-in-out infinite;
  }
  .bg-art::after {
    content: ""; position: absolute; inset: -16px;
    border-radius: 28px;
    border: 1px solid oklch(0.62 0.19 260 / 30%);
    animation: bg-ring 3.4s ease-in-out infinite;
  }
  .bg-art__svg { width: 100%; height: 100%; overflow: visible; }
  .bg-art__svg .doc-path { stroke-dasharray: 700; stroke-dashoffset: 700; animation: bg-doc-draw 1400ms 80ms cubic-bezier(0.16,1,0.3,1) both; }
  .bg-art__svg .spec-line { opacity: 0; transform-origin: left center; }
  .bg-art__svg .spec-line--1 { animation: bg-line-in 500ms 900ms ease-out both; }
  .bg-art__svg .spec-line--2 { animation: bg-line-in 500ms 1050ms ease-out both; }
  .bg-art__svg .spec-line--3 { animation: bg-line-in 500ms 1200ms ease-out both; }
  .bg-art__svg .big-spark {
    transform-origin: 48px 94px; transform-box: view-box;
    animation: bg-spark-in 700ms 150ms cubic-bezier(0.16,1,0.3,1) both,
               bg-spark-twinkle 2.6s 900ms ease-in-out infinite;
  }
  .bg-art__svg .diamond { transform-origin: center; transform-box: fill-box; opacity: 0; transform: scale(0.55); }
  .bg-art__svg .d1 { animation: bg-diamond-pop 500ms 700ms cubic-bezier(0.16,1,0.3,1) both, bg-diamond-twinkle 2.2s 1200ms ease-in-out infinite; }
  .bg-art__svg .d2 { animation: bg-diamond-pop 500ms 820ms cubic-bezier(0.16,1,0.3,1) both, bg-diamond-twinkle 2.2s 1400ms ease-in-out infinite; }
  .bg-art__svg .d3 { animation: bg-diamond-pop 500ms 940ms cubic-bezier(0.16,1,0.3,1) both, bg-diamond-twinkle 2.2s 1600ms ease-in-out infinite; }
  .bg-art__svg .d4 { animation: bg-diamond-pop 500ms 1060ms cubic-bezier(0.16,1,0.3,1) both, bg-diamond-twinkle 2.2s 1800ms ease-in-out infinite; }
  @keyframes bg-halo { 0%,100% { opacity: 0.7; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.08); } }
  @keyframes bg-doc-draw { 0% { stroke-dashoffset: 700; opacity: 0.3; } 100% { stroke-dashoffset: 0; opacity: 1; } }
  @keyframes bg-line-in { 0% { opacity: 0; transform: scaleX(0.4); } 100% { opacity: 1; transform: scaleX(1); } }
  @keyframes bg-spark-in { 0% { opacity: 0; transform: scale(0.4) rotate(-12deg); } 100% { opacity: 1; transform: scale(1) rotate(0); } }
  @keyframes bg-spark-twinkle { 0%,100% { transform: scale(0.92) rotate(-4deg); filter: brightness(0.9); } 50% { transform: scale(1.08) rotate(5deg); filter: brightness(1.15); } }
  @keyframes bg-diamond-pop { 0% { opacity: 0; transform: scale(0); } 60% { opacity: 1; transform: scale(0.7); } 100% { opacity: 1; transform: scale(0.55); } }
  @keyframes bg-diamond-twinkle { 0%,100% { opacity: 1; transform: scale(0.6) rotate(0); } 50% { opacity: 0.55; transform: scale(0.45) rotate(20deg); } }
  @keyframes bg-ring { 0%,100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.04); } }
  @keyframes drift { 0% { transform: translateY(0) translateX(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-110vh) translateX(40px); opacity: 0; } }

  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particles span {
    position: absolute; width: 2px; height: 2px;
    background: oklch(1 0 0 / 35%); border-radius: 50%;
    bottom: -10px; animation: drift 16s linear infinite;
  }
  .particles span:nth-child(1)  { left:  6%; animation-delay: -1s;  animation-duration: 18s; }
  .particles span:nth-child(2)  { left: 14%; animation-delay: -7s;  animation-duration: 22s; }
  .particles span:nth-child(3)  { left: 22%; animation-delay: -3s;  animation-duration: 20s; background: oklch(0.62 0.19 260 / 65%); }
  .particles span:nth-child(4)  { left: 30%; animation-delay: -11s; animation-duration: 24s; }
  .particles span:nth-child(5)  { left: 38%; animation-delay: -5s;  animation-duration: 19s; }
  .particles span:nth-child(6)  { left: 46%; animation-delay: -13s; animation-duration: 21s; background: oklch(0.62 0.19 260 / 50%); }
  .particles span:nth-child(7)  { left: 54%; animation-delay: -2s;  animation-duration: 23s; }
  .particles span:nth-child(8)  { left: 62%; animation-delay: -9s;  animation-duration: 17s; }
  .particles span:nth-child(9)  { left: 70%; animation-delay: -15s; animation-duration: 25s; }
  .particles span:nth-child(10) { left: 78%; animation-delay: -4s;  animation-duration: 18s; background: oklch(0.62 0.19 260 / 60%); }
  .particles span:nth-child(11) { left: 86%; animation-delay: -10s; animation-duration: 22s; }
  .particles span:nth-child(12) { left: 94%; animation-delay: -6s;  animation-duration: 20s; }

  /* hide ambient bg + particles when in project detail (split workspace) */
  .app:has(.workspace--split) .bg-art,
  .app:has(.workspace--split) .particles { display: none; }
  .workspace--split { background: var(--background); }
  .app { display: flex; height: 100%; }

  /* ============================ rail ============================ */
  .rail {
    width: 56px; flex-shrink: 0;
    background: oklch(0.15 0.005 250 / 92%);
    backdrop-filter: blur(8px);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 0;
    gap: 8px;
  }
  .rail__logo {
    width: 40px; height: 40px; border-radius: 8px;
    display: grid; place-items: center;
    overflow: visible;
    animation: rail-logo-in 700ms cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .rail__logo svg { width: 22px; height: 22px; overflow: visible; }
  .rail__logo .big-spark {
    transform-origin: 48px 94px; transform-box: view-box;
    animation: rail-spark-twinkle 3.4s 700ms ease-in-out infinite;
  }
  .rail__logo .diamond {
    transform-origin: center; transform-box: fill-box;
    animation: rail-diamond-twinkle 2.8s ease-in-out infinite;
  }
  .rail__logo .d2 { animation-delay: 0.3s; }
  .rail__logo .d3 { animation-delay: 0.6s; }
  .rail__logo .d4 { animation-delay: 0.9s; }
  @keyframes rail-logo-in {
    0%   { opacity: 0; transform: scale(0.7); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes rail-spark-twinkle {
    0%, 100% { transform: scale(1)    rotate(0deg);  filter: brightness(1); }
    50%      { transform: scale(1.08) rotate(3deg);  filter: brightness(1.2); }
  }
  @keyframes rail-diamond-twinkle {
    0%, 100% { opacity: 1;   transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.7); }
  }
  .rail {
    margin-bottom: 12px;
  }
  .rail__nav { display: flex; flex-direction: column; gap: 4px; flex: 1; width: 100%; align-items: center; }
  .rail__foot { width: 100%; display: flex; justify-content: center; }
  .rail__btn {
    width: 40px; height: 40px;
    background: transparent; border: 0;
    border-radius: 8px;
    color: oklch(0.7 0.005 250);
    display: grid; place-items: center;
    cursor: pointer;
    position: relative;
    transition: color 150ms, background 150ms;
  }
  .rail__btn:hover { background: var(--c-surface-2); color: oklch(0.93 0 0); }
  .rail__btn--active { color: var(--foreground); background: var(--c-primary-10); }
  .rail__btn--active::before {
    content: ""; position: absolute; left: -8px; top: 8px; bottom: 8px;
    width: 3px; border-radius: 0 3px 3px 0; background: var(--primary);
  }

  /* ========================== workspace ========================== */
  .workspace { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }
  .workspace--split { flex-direction: column; }
  .workspace__row { flex: 1; min-height: 0; display: flex; flex-direction: row; overflow: hidden; }

  /* ======================== project topbar ======================= */
  .ptopbar {
    height: 48px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    padding: 0 16px 0 20px;
    background: var(--background);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }
  .ptopbar__crumb { display: flex; align-items: center; gap: 8px; color: var(--muted-foreground); font-size: 12px; min-width: 0; }
  .ptopbar__crumb .sep { opacity: 0.5; }
  .ptopbar__crumb .link {
    background: transparent; border: 0; color: var(--muted-foreground); cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px; font: inherit; padding: 4px 6px;
    border-radius: 6px;
  }
  .ptopbar__crumb .link:hover { color: var(--foreground); background: var(--c-surface-2); }
  .ptopbar__crumb .proj { color: var(--foreground); font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ptopbar__actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .ptopbar__toggle {
    display: inline-flex; align-items: center; gap: 6px;
    height: 30px; padding: 0 10px;
    border-radius: 8px;
    background: transparent;
    color: var(--muted-foreground);
    border: 1px solid var(--border);
    font: inherit; font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: color 150ms, background 150ms, border-color 150ms;
  }
  .ptopbar__toggle:hover { color: var(--foreground); background: var(--c-surface-2); border-color: oklch(1 0 0 / 18%); }
  .ptopbar__toggle--on { color: var(--primary); background: var(--c-primary-10); border-color: var(--c-primary-20); }
  .ptopbar__toggle svg { transition: transform 200ms; }
  .ptopbar__toggle--on svg.chev { transform: rotate(180deg); }

  /* ============================ page ============================= */
  .page { padding: 32px 40px; overflow: auto; flex: 1; }
  .page__header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 28px;
  }
  .page__title { font-size: 24px; font-weight: 700; letter-spacing: -0.01em; margin: 0; }
  .page__sub { color: var(--muted-foreground); font-size: 13px; margin: 4px 0 0; }

  .proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

  /* ========================= project card ======================== */
  .proj-card.card-ui, .proj-card {
    background: oklch(0.17 0.005 250 / 45%);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
    cursor: pointer; transition: transform 200ms, box-shadow 200ms, border-color 200ms;
  }
  .proj-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: oklch(1 0 0 / 18%); }
  .proj-card__head { display: flex; justify-content: space-between; align-items: flex-start; }
  .proj-card__icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--c-primary-10); color: var(--primary);
    display: grid; place-items: center;
  }
  .proj-card__menu {
    width: 28px; height: 28px; border: 0; background: transparent;
    color: var(--muted-foreground); border-radius: 6px; cursor: pointer;
  }
  .proj-card__menu:hover { background: var(--c-surface-2); color: var(--foreground); }
  .proj-card__title { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .proj-card__meta { color: var(--muted-foreground); font-size: 12px; }
  .proj-card__row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .proj-card--new {
    background: transparent; border: 1px dashed var(--border);
    color: var(--muted-foreground);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; min-height: 200px; cursor: pointer;
    transition: color 150ms, border-color 150ms, background 150ms;
    font-family: inherit; font-size: 13px;
  }
  .proj-card--new:hover { color: var(--foreground); border-color: oklch(1 0 0 / 25%); background: var(--c-card); }

  /* =========================== progress ========================== */
  .progress {
    height: 4px; background: var(--c-surface-2); border-radius: 9999px; overflow: hidden;
  }
  .progress > i { display: block; height: 100%; background: var(--primary); transition: width 200ms; }

  /* =========================== buttons =========================== */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    height: 32px; padding: 0 12px;
    border-radius: var(--radius-md);
    font-family: inherit; font-size: 13px; font-weight: 500; line-height: 1;
    cursor: pointer; border: 1px solid transparent;
    transition: opacity 150ms, background 150ms, color 150ms, border-color 150ms;
    white-space: nowrap;
  }
  .btn--primary { background: var(--primary); color: var(--primary-foreground); }
  .btn--primary:hover { opacity: 0.9; }
  .btn--outline { background: transparent; color: var(--foreground); border-color: var(--border); }
  .btn--outline:hover { background: var(--c-surface-2); }
  .btn--ghost   { background: transparent; color: var(--foreground); }
  .btn--ghost:hover { background: var(--c-surface-2); }
  .btn--sm { height: 28px; padding: 0 10px; font-size: 12px; }
  .btn--icon { width: 32px; padding: 0; justify-content: center; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ============================ badges =========================== */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    height: 22px; padding: 0 8px; border-radius: 9999px;
    font-size: 11px; font-weight: 500; line-height: 1;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .badge--neutral { background: var(--c-surface-2); color: var(--muted-foreground); border-color: var(--border); }
  .badge--primary { background: var(--c-primary-10); color: var(--primary); border-color: var(--c-primary-20); }
  .badge--success { background: var(--c-success-10); color: var(--c-success); border-color: oklch(0.65 0.15 160 / 30%); }
  .badge--warning { background: var(--c-warning-10); color: var(--c-warning); border-color: oklch(0.7 0.18 80 / 30%); }
  .badge--purple  { background: oklch(0.7 0.18 290 / 10%); color: oklch(0.78 0.16 290); border-color: oklch(0.7 0.18 290 / 30%); }

  /* ============================ inputs =========================== */
  .inp {
    width: 100%; box-sizing: border-box;
    height: 32px; padding: 0 10px;
    background: transparent;
    color: var(--foreground); font-family: inherit; font-size: 13px;
    border: 1px solid var(--input);
    border-radius: var(--radius-md);
    outline: none;
    transition: border-color 150ms, box-shadow 150ms;
  }
  .inp:focus { border-color: var(--ring); box-shadow: 0 0 0 3px oklch(0.62 0.19 260 / 50%); }
  .inp--invalid { border-color: var(--destructive); box-shadow: 0 0 0 3px oklch(0.65 0.2 25 / 20%); }
  .inp--ta { height: auto; padding: 8px 10px; resize: vertical; min-height: 60px; line-height: 1.5; }
  .inp::placeholder { color: oklch(1 0 0 / 40%); }

  /* =========================== avatars =========================== */
  .avatar {
    width: 28px; height: 28px; border-radius: 9999px;
    display: grid; place-items: center; flex-shrink: 0;
    font-size: 11px; font-weight: 600;
  }
  .avatar--primary { background: var(--c-primary-10); color: var(--primary); border: 1px solid var(--c-primary-20); }
  .avatar--neutral { background: var(--c-surface-2); color: var(--foreground); }

  /* ============================= card ============================ */
  .card-ui {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    transition: box-shadow 200ms, transform 200ms;
  }
  .card-ui--hover:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }

  /* ============================ wizard =========================== */
  .wiz { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); background: oklch(0.13 0.005 250 / 35%); backdrop-filter: blur(8px); }
  .wiz__head {
    padding: 0 32px;
    border-bottom: 1px solid var(--border);
    background: var(--background);
    position: sticky; top: 0; z-index: 5;
  }
  .wiz__row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; gap: 16px; }
  .wiz__title-wrap { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .wiz__pill {
    display: inline-flex; align-items: center; height: 18px; padding: 0 8px;
    border-radius: 9999px; background: var(--c-primary-10); color: var(--primary);
    font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
    border: 1px solid var(--c-primary-20);
    width: fit-content;
  }
  .wiz__title { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.2; }
  .wiz__cta { display: flex; gap: 12px; align-items: center; flex-shrink: 0; }
  .wiz__step-meta { color: var(--muted-foreground); font-size: 12px; margin-right: 8px; white-space: nowrap; }

  .wiz__inner { padding: 24px 32px 32px; overflow: auto; flex: 1; }

  .wiz__foot {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    padding: 14px 32px;
    border-top: 1px solid var(--border);
    background: var(--background);
    flex-shrink: 0;
  }

  .wiz__body { margin-top: 4px; }

  /* =========================== stepper =========================== */
  .wiz__stepper-row { height: 48px; display: flex; align-items: center; overflow-x: auto; }
  .stepper { display: flex; align-items: center; gap: 0; min-width: max-content; }
  .stepper__step {
    display: flex; align-items: center; gap: 6px;
    background: transparent; border: 0; padding: 4px 6px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--muted-foreground);
    font: inherit;
    transition: background 150ms;
  }
  .stepper__step:hover { background: var(--c-surface-2); }
  .stepper__dot {
    width: 24px; height: 24px; border-radius: 9999px;
    background: var(--c-surface-2); color: var(--muted-foreground);
    display: grid; place-items: center;
    font-size: 11px; font-weight: 600;
    transition: background 150ms, color 150ms, box-shadow 150ms;
  }
  .stepper__label { font-size: 12px; font-weight: 500; }
  .stepper__line { flex: 1; height: 2px; background: var(--c-surface-2); min-width: 8px; }
  .stepper__line--done { background: var(--primary); }
  .stepper__step--done .stepper__dot { background: var(--primary); color: var(--primary-foreground); }
  .stepper__step--active .stepper__dot { background: var(--primary); color: var(--primary-foreground); box-shadow: 0 0 0 3px oklch(0.62 0.19 260 / 30%); }
  .stepper__step--active .stepper__label { color: var(--foreground); font-weight: 600; }

  /* ============================= form ============================ */
  .form { display: flex; flex-direction: column; gap: 20px; max-width: 880px; }
  .form__row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 1100px) { .form__row { grid-template-columns: 1fr; } }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--muted-foreground); }
  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; height: 28px; padding: 0 12px;
    border-radius: 9999px; background: transparent; color: var(--muted-foreground);
    border: 1px solid var(--border); font-size: 12px; cursor: pointer;
    transition: all 150ms;
    white-space: nowrap;
  }
  .chip:hover { background: var(--c-surface-2); color: var(--foreground); }
  .chip--on { background: var(--c-primary-10); color: var(--primary); border-color: var(--c-primary-30); font-weight: 500; }

  /* ============================ features ========================= */
  .features { display: flex; flex-direction: column; gap: 8px; max-width: 720px; }
  .feat {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-lg);
  }
  .feat__name { font-size: 14px; font-weight: 500; }

  /* ============================ empty ============================ */
  .empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; padding: 40px 24px;
    color: var(--muted-foreground);
    text-align: center;
  }
  .empty svg { opacity: 0.3; margin-bottom: 4px; }
  .empty h3 { margin: 0; font-size: 14px; font-weight: 600; color: var(--foreground); }
  .empty p { margin: 0; font-size: 12px; max-width: 320px; line-height: 1.55; }

  /* =========================== right panel ======================= */
  .rpanel {
    width: 400px; flex-shrink: 0;
    background: oklch(0.13 0.005 250 / 35%);
    backdrop-filter: blur(8px);
    display: flex; flex-direction: column;
    overflow: hidden;
    border-left: 1px solid var(--border);
    position: relative;
    transition: width 250ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  .rpanel--collapsed { width: 0; border-left: 0; }
  .rpanel__resize {
    position: absolute; left: -3px; top: 0; bottom: 0; width: 6px;
    cursor: col-resize; z-index: 10;
  }
  .rpanel__resize:hover, .rpanel__resize--active { background: var(--c-primary-20); }
  .rpanel__body { flex: 1; overflow: hidden; min-height: 0; display: flex; flex-direction: column; }
  .rpanel--collapsed .rpanel__body { display: none; }

  .tabs { display: flex; gap: 0; height: 48px; align-items: stretch; border-bottom: 1px solid var(--border); padding: 0 16px; flex-shrink: 0; overflow-x: auto; }
  .tabs__tab {
    background: transparent; border: 0;
    padding: 0 12px; cursor: pointer;
    color: var(--muted-foreground); font: inherit; font-size: 13px; font-weight: 500;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: color 150ms, border-color 150ms;
  }
  .tabs__tab:hover { color: var(--foreground); }
  .tabs__tab--active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
  .tabs__count {
    background: var(--c-surface-2); color: var(--muted-foreground);
    padding: 1px 6px; border-radius: 9999px; font-size: 10px; font-weight: 500;
  }
  .tabs__tab--active .tabs__count { background: var(--c-primary-10); color: var(--primary); }

  /* ============================== chat =========================== */
  .chat { display: flex; flex-direction: column; flex: 1; min-height: 0; }
  .chat__list { flex: 1; min-height: 0; overflow: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .chat__row { display: flex; gap: 8px; align-items: flex-end; }
  .chat__row--mine { justify-content: flex-end; }
  .chat__row--cont .avatar { visibility: hidden; }
  .chat__row--cont { margin-top: -8px; }
  .chat__bubble { max-width: 70%; padding: 10px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
  .chat__bubble--bot  { background: var(--c-surface-2); color: var(--foreground); border-top-left-radius: 4px; }
  .chat__bubble--mine { background: var(--primary); color: var(--primary-foreground); border-top-right-radius: 4px; }
  .chat__compose { padding: 12px; display: flex; gap: 8px; align-items: flex-end; }
  .chat__compose .inp--ta { min-height: 36px; }

  /* ========================== decisions ========================== */
  .decisions, .clarifs, .tasks { padding: 16px; display: flex; flex-direction: column; gap: 12px; overflow: auto; flex: 1; min-height: 0; }
  .decision {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 14px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .decision--rec { border-color: var(--c-primary-20); }
  .decision__head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .decision__title { font-size: 13px; font-weight: 600; }
  .decision__rationale { margin: 0; color: var(--muted-foreground); font-size: 12px; line-height: 1.5; }
  .decision__row { display: flex; justify-content: space-between; align-items: center; }

  .clarif {
    background: var(--card); border: 1px solid var(--border);
    border-color: oklch(0.7 0.18 80 / 25%);
    border-radius: var(--radius-lg);
    padding: 14px; display: flex; flex-direction: column; gap: 10px;
  }
  .clarif--done { border-color: var(--border); opacity: 0.7; }
  .clarif__head { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; line-height: 1.5; }
  .clarif--done .clarif__head { color: var(--muted-foreground); text-decoration: line-through; }
  .clarif__head svg { color: var(--c-warning); flex-shrink: 0; margin-top: 3px; }
  .clarif--done .clarif__head svg { color: var(--c-success); }
  .clarif__body { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }

  .task {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-lg);
  }
  .task__check {
    width: 18px; height: 18px; border-radius: 4px;
    border: 1px solid var(--border);
    display: grid; place-items: center; flex-shrink: 0;
    color: var(--primary-foreground);
  }
  .task__check--on { background: var(--primary); border-color: var(--primary); }
  .task__body { flex: 1; min-width: 0; }
  .task__title { font-size: 13px; font-weight: 500; }
  .task__meta { color: var(--muted-foreground); font-size: 11px; margin-top: 2px; }
</style>
</head>

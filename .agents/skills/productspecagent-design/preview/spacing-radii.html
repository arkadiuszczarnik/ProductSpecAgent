<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card">
  <div class="row">
    <div class="stack" style="flex:1">
      <div style="display:flex;gap:8px;align-items:center"><span style="width:6px;height:6px;border-radius:6px;background:var(--c-surface-2)"></span><small>radius-sm · 6</small></div>
      <div style="display:flex;gap:8px;align-items:center"><span style="width:8px;height:8px;border-radius:8px;background:var(--c-surface-2)"></span><small>radius-md · 8 · buttons, inputs</small></div>
      <div style="display:flex;gap:8px;align-items:center"><span style="width:10px;height:10px;border-radius:10px;background:var(--c-surface-2)"></span><small>radius-lg · 10 · cards (base)</small></div>
      <div style="display:flex;gap:8px;align-items:center"><span style="width:14px;height:14px;border-radius:14px;background:var(--c-surface-2)"></span><small>radius-xl · 14 · dialogs</small></div>
      <div style="display:flex;gap:8px;align-items:center"><span style="width:14px;height:14px;border-radius:9999px;background:var(--c-surface-2)"></span><small>radius-pill · badges, avatars</small></div>
    </div>
    <div class="stack" style="flex:1">
      <div style="display:flex;align-items:center;gap:10px"><span style="width:48px;height:32px;border-radius:8px;background:var(--card);border:1px solid var(--border)"></span><small>1px border<br>oklch(1 0 0 / 10%)</small></div>
      <div style="display:flex;align-items:center;gap:10px"><span style="width:48px;height:32px;border-radius:8px;background:var(--card);box-shadow:var(--shadow-sm)"></span><small>shadow-sm<br>workhorse</small></div>
      <div style="display:flex;align-items:center;gap:10px"><span style="width:48px;height:32px;border-radius:8px;background:var(--card);box-shadow:var(--shadow-md)"></span><small>shadow-md<br>card hover, dialogs</small></div>
    </div>
  </div>
</body></html>

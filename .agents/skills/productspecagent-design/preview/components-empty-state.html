<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:18px; background:var(--card); border:1px dashed var(--border); border-radius: var(--radius-lg); text-align:center; flex:1; }
.empty .ic { width:36px; height:36px; opacity:0.3; }
.empty h3 { margin:0; font-size:14px; font-weight:600; }
.empty p { margin:0; font-size:12px; color:var(--muted-foreground); }
</style></head>
<body class="card">
  <div class="row">
    <div class="empty">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      <h3>No tasks yet</h3>
      <p>Generate a plan from your spec to create tasks.</p>
    </div>
    <div class="empty">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <h3>Keine Dokumente</h3>
      <p>Lade Dateien hoch, um sie dem Spec-Kontext hinzuzufügen.</p>
    </div>
  </div>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.tabs { display:flex; gap:4px; border-bottom:1px solid var(--border); }
.tab { padding: 10px 14px; font-size:13px; font-weight:500; color:var(--muted-foreground); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color 150ms, border-color 150ms; display:inline-flex; align-items:center; gap:6px;}
.tab:hover { color: var(--foreground); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight:600; }
.tab .c { color: var(--muted-foreground); font-size:11px; background:var(--c-surface-2); padding:2px 6px; border-radius:9999px; }
.tab.active .c { background: var(--c-primary-10); color: var(--primary); }
</style></head>
<body class="card">
  <div class="tabs">
    <div class="tab active">Chat <span class="c">2</span></div>
    <div class="tab">Decisions <span class="c">7</span></div>
    <div class="tab">Clarifications <span class="c">1</span></div>
    <div class="tab">Tasks</div>
    <div class="tab">Documents</div>
  </div>
</body></html>

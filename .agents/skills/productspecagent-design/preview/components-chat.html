<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.row3 { display:flex; gap:14px; align-items:flex-start; }
.bubble { max-width:62%; padding:10px 12px; border-radius:12px; font-size:13px; line-height:1.5; }
.from-bot { background: var(--c-surface-2); color: var(--foreground); border-top-left-radius:4px; }
.from-me  { background: var(--primary); color: var(--primary-foreground); border-top-right-radius:4px; }
.av { width:28px; height:28px; border-radius:9999px; flex-shrink:0; display:grid; place-items:center; font-size:11px; }
.av.bot { background: var(--c-primary-10); color: var(--primary); border:1px solid var(--c-primary-20); }
.av.me  { background: var(--c-surface-2); }
.spacer { flex:1; }
</style></head>
<body class="card">
  <div class="stack">
    <div class="row3">
      <div class="av bot"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="10" x="3" y="11" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><path d="M8 16h.01"/><path d="M16 16h.01"/></svg></div>
      <div class="bubble from-bot">Hallo! Ich bin bereit. Wir sind aktuell im Schritt <b>FRONTEND</b>.</div>
    </div>
    <div class="row3">
      <div class="spacer"></div>
      <div class="bubble from-me">Lass uns mit dem Layout starten.</div>
      <div class="av me">JR</div>
    </div>
  </div>
</body></html>

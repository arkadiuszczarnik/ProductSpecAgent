<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.fld { display:flex; flex-direction:column; gap:6px; flex:1; }
.fld label { font-size: 12px; color: var(--muted-foreground); font-weight: 500; }
.inp {
  height: 32px; padding: 0 10px;
  background: transparent;
  border: 1px solid var(--input);
  border-radius: var(--radius-md);
  color: var(--foreground);
  font: inherit; font-size: 13px;
  outline: none;
  transition: border-color 150ms, box-shadow 150ms;
}
.inp:focus { border-color: var(--ring); box-shadow: 0 0 0 3px oklch(0.62 0.19 260 / 50%); }
.inp.invalid { border-color: var(--destructive); box-shadow: 0 0 0 3px oklch(0.65 0.2 25 / 20%); }
.inp::placeholder { color: oklch(1 0 0 / 40%); }
</style></head>
<body class="card">
  <div class="row">
    <div class="fld"><label>Idee</label><input class="inp" value="Bromo Control Hub" /></div>
    <div class="fld"><label>Kategorie</label><input class="inp" placeholder="Web-App, Mobile-App…" /></div>
    <div class="fld"><label>Validation</label><input class="inp invalid" value="zu kurz" /></div>
  </div>
</body></html>
